name: Daily Pre-Commit Dashboard Update

on:
  schedule:
    # 每天 UTC 1:00 执行（北京时间 9:00）
    - cron: '0 1 * * *'

  # 支持手动触发
  workflow_dispatch:

  # 推送到 main 分支时也触发（可选）
  push:
    branches: [ main ]

permissions:
  contents: write  # 需要写入权限来提交文件

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch pre-commit data
        run: |
          echo "开始获取 pre-commit 数据..."
          python scripts/fetch_history.py -n 20
        env:
          TZ: 'Asia/Shanghai'

      - name: Generate dashboard HTML
        run: |
          echo "生成看板..."
          python scripts/generate_history.py

      - name: Copy assets to docs folder
        run: |
          mkdir -p docs
          cp output/*.html docs/
          cp output/*.json docs/
          python scripts/generate_index_md.py docs/index.md docs/update_info.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: 更新 pre-commit 看板数据 [auto]'
          force_orphan: false
